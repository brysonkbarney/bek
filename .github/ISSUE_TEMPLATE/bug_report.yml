name: Bug report
description: Report a reproducible Bek defect.
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make Bek launch-ready. Please do not include secrets, Slack tokens, model provider keys, private prompts, or private repo data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: "@bek created a run, but the approval never appeared in the admin console."
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Slack events
        - Admin console
        - API
        - Access bundles and policy
        - Approvals
        - Model routing
        - MCP tools
        - Sandbox/runtime
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include exact commands, endpoint paths, or UI steps when possible.
      placeholder: |
        1. Run pnpm dev
        2. POST /api/runs with ...
        3. Open /runs
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node, pnpm, browser, Docker, Slack app mode, and relevant non-secret environment variable names.
      placeholder: |
        macOS 15
        Node 25
        pnpm 11.1.3
        BEK_API_PORT=4317
  - type: checkboxes
    id: invariants
    attributes:
      label: Product invariant check
      options:
        - label: This report keeps the visible user-facing Slack handle as @bek.
        - label: This report does not ask end users to choose among multiple agent names.
        - label: This report does not require bypassing admin-governed channels, access bundles, tools, repos, models, budgets, or approvals.
