name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: bek
          POSTGRES_PASSWORD: bek
          POSTGRES_DB: bek
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bek -d bek"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Smoke
        run: pnpm smoke

      - name: Migrate Postgres
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgres://bek:bek@localhost:5432/bek

      - name: Smoke Postgres worker queue
        run: BEK_SMOKE_API_PORT=4318 BEK_SMOKE_STORAGE=postgres BEK_SMOKE_WORKER_QUEUE_BACKEND=postgres pnpm smoke
        env:
          DATABASE_URL: postgres://bek:bek@localhost:5432/bek

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency review
        uses: actions/dependency-review-action@v4
