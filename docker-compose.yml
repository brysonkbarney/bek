name: bek
services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "54329:5432"
    environment:
      POSTGRES_USER: bek
      POSTGRES_PASSWORD: bek
      POSTGRES_DB: bek
    volumes:
      - bek-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bek"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: valkey/valkey:8
    ports:
      - "63799:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2026-06-06T09-32-03Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: bek
      MINIO_ROOT_PASSWORD: bek-local-dev
    volumes:
      - bek-minio:/data

volumes:
  bek-postgres:
  bek-minio:
